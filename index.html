<style>

  :root{
    --teal-deep:#0A3934;
    --teal:#0E4B45;
    --teal-soft:#E4ECE7;
    --ball:#D6E24A;
    --ball-deep:#AEB934;
    --coral:#E2604A;
    --paper:#F4F6F1;
    --ink:#16211C;
    --ink-soft:#5B665F;
    --line: rgba(22,33,28,0.16);
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background: #05201C;
    background-image: radial-gradient(circle at 50% -10%, #123f38 0%, #05201C 55%);
    font-family:'Noto Sans JP', sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .font-display{ font-family:'Noto Sans JP', sans-serif; font-weight:900; letter-spacing:0.01em; }
  .font-cond{ font-family:'Barlow Condensed', sans-serif; letter-spacing:0.04em; }
  .font-mono{ font-family:'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
  .no-scrollbar::-webkit-scrollbar{ display:none; }
  .no-scrollbar{ -ms-overflow-style:none; scrollbar-width:none; }

  .phone{
    width:430px; max-width:100vw; height:100vh; max-height:932px;
    background:var(--paper);
    position:relative;
    overflow:hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,0.5);
  }
  @media (min-width:431px){
    .phone{ border-radius:44px; border:10px solid #0A0F0D; height:900px; margin-top:16px; margin-bottom:16px; }
  }

  .kitchen-divider{
    border-top: 2px dashed var(--line);
    position:relative;
  }
  .kitchen-label{
    position:absolute; top:-11px; left:16px; background:var(--paper);
    padding:0 8px; font-size:11px; color:var(--ink-soft);
  }

  .tab-btn{ transition: all .15s ease; }
  .tab-btn[data-active="true"] .tab-icon{ color: var(--ball-deep); }
  .tab-btn[data-active="true"] .tab-label{ color: var(--teal-deep); font-weight:700; }
  .tab-btn .tab-icon{ color:#9AA69D; }
  .tab-btn .tab-label{ color:#9AA69D; }

  .btn-primary{
    background: var(--ball); color: var(--teal-deep); font-weight:700;
    transition: transform .1s ease, filter .15s ease;
  }
  .btn-primary:hover{ filter:brightness(0.95); }
  .btn-primary:active{ transform: scale(0.97); }
  .btn-primary:disabled{ background:#D8DDD4; color:#9AA69D; }

  .btn-outline{
    border:1.5px solid var(--teal); color:var(--teal); font-weight:700;
    background:transparent;
  }
  .btn-outline:active{ transform:scale(0.97); }

  .card{
    background:#fff; border:1px solid rgba(22,33,28,0.08);
    border-radius:16px;
  }

  .chip{
    font-family:'Barlow Condensed',sans-serif; font-weight:600; letter-spacing:0.03em;
    border-radius:999px; padding:3px 10px; font-size:12px; line-height:1.4;
  }

  .bracket-line{ border-color: rgba(22,33,28,0.25); }

  input[type=checkbox].court-check{ accent-color: var(--teal); }

  .segmented button{ transition: all .15s ease; }

  .toast{
    animation: toastIn .25s ease, toastOut .3s ease 1.7s forwards;
  }
  @keyframes toastIn{ from{ opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
  @keyframes toastOut{ to{ opacity:0; transform:translateY(-6px);} }

</style>

function calcNewLevel(myLevel, oppLevel, didWin) {
  const expected = 1 / (1 + Math.pow(10, (oppLevel - myLevel) / 2));
  const actual = didWin ? 1 : 0;
  const K = 0.12;

  const rounds = [{

    matches: round1

}

function sortByLevel(players) {
  return [...players].sort((a, b) => a.level - b.level);
}

// ソート済み配列を4人1組・コートに割り当て（組内はスネーク方式でチーム分け）
function chunkIntoCourts(sortedPlayers) {
  const groups = [];
  for (let i = 0; i < sortedPlayers.length; i += 4) {
    groups.push(sortedPlayers.slice(i, i + 4));
  }
  return groups.map((g, idx) => {
    if (g.length === 4) {
      return {
        court: idx + 1,
        teamA: [g[0], g[3]],
        teamB: [g[1], g[2]]
      };
    }
    return {
      court: idx + 1,
      teamA: g,
      teamB: []
    };
  });
}
